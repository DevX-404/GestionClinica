<div class="flex min-h-screen items-center justify-center bg-gray-50 p-4 dark:bg-gray-dark">
  <div class="w-full max-w-md rounded-2xl border border-gray-200 bg-white p-6 shadow-theme-xl dark:border-gray-800 dark:bg-white/[0.02] sm:p-8">
    
    <div class="mb-8 text-center">
      <h1 class="text-2xl font-bold text-black dark:text-white mb-2">
        Gestión<span class="text-brand-500">Clínica</span>
      </h1>
      <p class="text-sm font-medium text-gray-500 dark:text-gray-400">
        Ingresa tus credenciales para acceder al sistema
      </p>
    </div>

    <form (submit)="onLogin($event)" class="space-y-5">
      
      <div>
        <label class="mb-2.5 block font-medium text-gray-700 text-sm dark:text-gray-300">
          Correo Electrónico / Usuario
        </label>
        <input type="text" placeholder="ejemplo@clinic.com" 
          class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-black outline-none transition focus:border-brand-500 dark:border-gray-700 dark:text-white dark:focus:border-brand-500" />
      </div>

      <div>
        <label class="mb-2.5 block font-medium text-gray-700 text-sm dark:text-gray-300">
          Contraseña
        </label>
        <input type="password" placeholder="••••••••" 
          class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-black outline-none transition focus:border-brand-500 dark:border-gray-700 dark:text-white dark:focus:border-brand-500" />
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-gray-500 dark:text-gray-400 select-none">
          <input type="checkbox" class="rounded border-gray-300 text-brand-500 focus:ring-brand-500" />
          Recordarme
        </label>
        <a href="#" class="font-medium text-brand-500 hover:underline text-theme-xs">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <button type="submit" 
        class="w-full rounded-lg bg-brand-500 py-3 font-medium text-white transition hover:bg-brand-600 text-sm shadow-theme-md">
        Iniciar Sesión
      </button>

    </form>
  </div>
</div>
