<div class="relative">
  <button
    (click)="toggleDropdown()"
    class="flex items-center text-gray-700 dark:text-gray-400"
  >
    <span class="mr-3 overflow-hidden rounded-full h-11 w-11">
      <img src="/images/user/owner.png" alt="Usuario" />
    </span>

    <span class="hidden lg:block text-right mr-2">
      <span class="block font-medium text-theme-sm capitalize">
        {{ nombreUsuario }}
      </span>
      <span class="block text-xs text-gray-500 capitalize">
        {{ rolUsuario }}
      </span>
    </span>

    <svg
      [ngClass]="{
        'transition-transform duration-200': true,
        'rotate-180': isDropdownOpen
      }"
      width="18"
      height="20"
      viewBox="0 0 18 20"
      fill="none"
    >
      <path
        d="M4.3125 8.65625L9 13.3437L13.6875 8.65625"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>

  @if (isDropdownOpen) {
    <div
      class="absolute right-0 mt-4 w-[260px] rounded-2xl border border-gray-200 bg-white p-3 shadow-theme-lg dark:border-gray-800 dark:bg-gray-dark z-50"
    >
      <!-- Información del usuario -->
      <div>
        <span class="block font-medium text-gray-700 text-theme-sm dark:text-gray-300">
          {{ nombreUsuario }}
        </span>

        <span class="mt-0.5 block text-theme-xs text-gray-500 capitalize">
          {{ rolUsuario }}
        </span>
      </div>

      <!-- Opciones -->
      <ul class="flex flex-col gap-1 pt-4 pb-3 border-b border-gray-200 dark:border-gray-800">
        <li>
          <a
            routerLink="/perfil"
            class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100"
          >
            Mi Perfil
          </a>
        </li>

        <li>
          <a
            routerLink="/configuracion"
            class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100"
          >
            Configuración
          </a>
        </li>
      </ul>

      <!-- Cerrar sesión -->
      <button
        (click)="cerrarSesion()"
        class="flex w-full items-center gap-3 px-3 py-2 mt-3 font-medium text-red-500 rounded-lg hover:bg-red-50"
      >
        Cerrar Sesión
      </button>
    </div>
  }
</div>
