<div class="flex min-h-screen items-center justify-center bg-gray-50/50 p-4 dark:bg-gray-dark relative overflow-hidden">
  
  <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-brand-500/10 blur-[120px] pointer-events-none"></div>
  <div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-blue-500/10 blur-[120px] pointer-events-none"></div>

  <div class="w-full max-w-md rounded-3xl border border-gray-200 bg-white/80 p-8 shadow-2xl backdrop-blur-xl dark:border-gray-800 dark:bg-gray-900/80 relative z-10">
    
    <div class="mb-8 text-center">
      <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-2xl bg-brand-50 mb-4 dark:bg-brand-900/20 shadow-inner">
        <svg class="h-8 w-8 text-brand-600 dark:text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
      </div>
      <h1 class="text-2xl font-black text-gray-900 dark:text-white tracking-tight">
        Gestión<span class="text-brand-600 dark:text-brand-400">Clínica</span>
      </h1>
      <p class="text-xs font-bold text-gray-500 dark:text-gray-400 mt-2 uppercase tracking-widest">
        Acceso Restringido
      </p>
    </div>

    @if (errorMsg) {
      <div class="mb-6 rounded-xl bg-red-50 p-4 border border-red-200 flex items-start gap-3 animate-fade-in shadow-sm dark:bg-red-900/10 dark:border-red-900/50">
        <svg class="h-5 w-5 text-red-600 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        <p class="text-sm text-red-800 dark:text-red-400 font-bold leading-tight">{{ errorMsg }}</p>
      </div>
    }

    <form (submit)="onLogin($event)" class="space-y-5">
      
      <div>
        <label class="mb-1.5 block text-xs font-bold text-gray-600 uppercase tracking-wider dark:text-gray-400">
          Credencial de Usuario
        </label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          </span>
          <input type="text" name="username" [(ngModel)]="usernameTxt" placeholder="Ej: lperez" [disabled]="loading"
            class="w-full rounded-xl border border-gray-300 bg-white pl-11 pr-4 py-3 text-sm text-gray-900 outline-none transition focus:border-brand-500 focus:ring-1 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-800 dark:text-white disabled:bg-gray-100 font-medium shadow-sm" />
        </div>
      </div>

      <div>
        <label class="mb-1.5 block text-xs font-bold text-gray-600 uppercase tracking-wider dark:text-gray-400">
          Clave de Seguridad
        </label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </span>
          <input type="password" name="password" [(ngModel)]="passwordTxt" placeholder="••••••••" [disabled]="loading"
            class="w-full rounded-xl border border-gray-300 bg-white pl-11 pr-4 py-3 text-sm text-gray-900 outline-none transition focus:border-brand-500 focus:ring-1 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-800 dark:text-white disabled:bg-gray-100 font-mono font-bold shadow-sm" />
        </div>
      </div>

      <div class="flex items-center justify-between pt-2">
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="checkbox" name="mantenerSesion" [(ngModel)]="mantenerSesion" [disabled]="loading"
                 class="h-4 w-4 rounded border-gray-300 text-brand-600 focus:ring-brand-500 transition cursor-pointer disabled:opacity-50">
          <span class="text-sm font-bold text-gray-600 group-hover:text-gray-900 transition dark:text-gray-400 dark:group-hover:text-gray-200">
            Mantener sesión iniciada
          </span>
        </label>
      </div>

      <button type="submit" [disabled]="loading"
        class="mt-4 w-full rounded-xl bg-brand-600 py-3.5 font-bold text-white transition-all hover:bg-brand-700 text-sm shadow-lg hover:shadow-brand-500/30 disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2 transform active:scale-[0.98]">
        
        @if (loading) {
          <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Validando credenciales...
        } @else {
          Acceder al Sistema
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        }
      </button>

    </form>
  </div>
</div>
